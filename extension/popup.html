<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; width: 280px; background: #0f172a; color: #e2e8f0; }
    .header { background: #1e293b; padding: 16px; border-bottom: 1px solid #334155; }
    .header h1 { font-size: 15px; font-weight: bold; }
    .header p { font-size: 11px; color: #64748b; margin-top: 2px; }
    .body { padding: 16px; }
    .status { display: flex; align-items: center; gap: 10px; background: #1e293b; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-green { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .dot-red { background: #ef4444; }
    .dot-yellow { background: #f59e0b; }
    .status-text { font-size: 13px; font-weight: bold; }
    .status-sub { font-size: 11px; color: #64748b; margin-top: 2px; }
    .user-box { background: #1e293b; border-radius: 12px; padding: 12px; font-size: 12px; }
    .user-name { font-weight: bold; color: #e2e8f0; }
    .user-email { color: #64748b; margin-top: 2px; }
    .footer { padding: 12px 16px; font-size: 11px; color: #334155; border-top: 1px solid #1e293b; text-align: center; }
    a { color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Matara Publisher</h1>
    <p>פרסום אוטומטי לקבוצות פייסבוק</p>
  </div>
  <div class="body">
    <div class="status">
      <div class="dot" id="dot"></div>
      <div>
        <div class="status-text" id="statusText">בודק...</div>
        <div class="status-sub" id="statusSub"></div>
      </div>
    </div>
    <div class="user-box" id="userBox" style="display:none">
      <div class="user-name" id="userName"></div>
      <div class="user-email" id="userEmail"></div>
    </div>
  </div>
  <div class="footer" id="footer"></div>
  <script src="popup.js"></script>
</body>
</html>
